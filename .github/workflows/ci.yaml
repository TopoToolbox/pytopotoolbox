name: CI
on:
  pull_request:
  push:
    branches: ["main"]
jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13.5']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest build

      - name: Build and install TopoToolbox
        run: |
          pip install .[opensimplex]

      - name: Run tests
        run: |
          python -m pytest

      - name: Downgrade numpy
        if: ${{ matrix.python-version <= '3.11' }}
        run: |
          pip install matplotlib scipy rasterio pandas geopandas "numpy==1.23.5" --upgrade --upgrade-strategy eager
          pytest
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Install tools
        run: pip install -r requirements.txt

      - name: Run pylint
        run: pylint --rcfile=pyproject.toml src/topotoolbox/

      - name: Run type checks
        run: mypy --ignore-missing-imports src/topotoolbox
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/topotoolbox
          key: tt3-docs-data
      - name: Install Pandoc
        run: sudo apt-get install -y pandoc
      - name: Ensure API key is available for examples that require it
        env:
          OPENTOPOGRAPHY_API_KEY: ${{ secrets.OPENTOPOGRAPHY_API_KEY }}
        run: |
          printf '%s' "$OPENTOPOGRAPHY_API_KEY" > $HOME/.opentopography.txt
      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ github.workspace }}/docs/requirements.txt
          python3 -m pip install .[opensimplex]
      - name: Build Sphinx documentation
        working-directory: ${{ github.workspace }}/docs
        run: |
          make clean
          make html
      - name: Upload documentation as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: ${{ github.workspace }}/docs/_build/html
