name: Create and upload wheels and source distribution

on:
  release:
    types: [published]

jobs:
  make_sdist:
    if: github.repository == 'TopoToolbox/pytopotoolbox'
    name: Make SDist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0

      - name: Install build
        run: python -m pip install build

      - name: Build SDist
        run: python -m build --sdist

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  build_wheels:
    if: github.repository == 'TopoToolbox/pytopotoolbox'
    name: Wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, macos-13]
        cibw_arch: ["native"]
        cibw_build: ["cp310-* cp311-* cp312-* cp313-*"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.21.3

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_SKIP: "*musllinux*"
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {package}/tests
          CIBW_TEST_EXTRAS: opensimplex

          # Use newer glibc so pyproj has wheels
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Keep pip recent during build isolation
          CIBW_BEFORE_BUILD: python -m pip install -U pip

          # Force wheels during (Linux) test-time installs
          CIBW_ENVIRONMENT_LINUX: PIP_ONLY_BINARY=":all:"
          CIBW_TEST_ENVIRONMENT_LINUX: PIP_ONLY_BINARY=":all:"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  upload_assets:
    if: github.repository == 'TopoToolbox/pytopotoolbox'
    name: Upload release assets
    needs: [build_wheels, make_sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true
      - name: Upload assets to release
        run: gh release upload --repo $GITHUB_REPOSITORY $TAG dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}

  upload-pypi:
    if: github.repository == 'TopoToolbox/pytopotoolbox'
    name: Upload release assets to PyPI
    needs: [build_wheels, make_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          verbose: true
